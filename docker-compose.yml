services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ly_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-ly_dashboard}
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ly} -d ${POSTGRES_DB:-ly_dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ly}:${POSTGRES_PASSWORD:-ly_dev_pw}@postgres:5432/${POSTGRES_DB:-ly_dashboard}
    ports:
      - "8000:8000"

  web:
    build: ./web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
      API_INTERNAL_URL: http://api:8000
    ports:
      - "3000:3000"

  sync:
    build: ./sync
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ly}:${POSTGRES_PASSWORD:-ly_dev_pw}@postgres:5432/${POSTGRES_DB:-ly_dashboard}
    # Run once on startup, then sleep forever (PoC: run manually with `docker compose run --rm sync`)
    command: ["python", "-m", "src.main"]
    restart: "no"

volumes:
  pgdata:
